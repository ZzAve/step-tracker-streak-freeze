<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wachtwoord vergeten – Stappen Streak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared.css">
  <style>
    .auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .auth-logo { font-size: 4rem; margin-bottom: 1rem; }
    .auth-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .auth-subtitle { color: var(--text-muted); margin-bottom: 2.5rem; font-size: 1rem; max-width: 340px; }
    .auth-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .auth-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-family: 'Nunito', system-ui, sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-input::placeholder { color: var(--text-muted); }
    .auth-error {
      color: var(--red);
      font-size: 0.875rem;
      min-height: 1.25rem;
      text-align: left;
    }
    .auth-success {
      color: var(--green);
      font-size: 0.9rem;
      background: var(--green-bg);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
    }
    .btn-submit {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.85rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Nunito', system-ui, sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-submit:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .auth-links { font-size: 0.875rem; color: var(--text-muted); }
    .auth-links a { color: var(--accent); text-decoration: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="auth-screen">
    <div class="auth-logo">🔑</div>
    <h1 class="auth-title">Wachtwoord vergeten</h1>
    <p class="auth-subtitle">Voer je e-mailadres in en we sturen je een link om je wachtwoord opnieuw in te stellen.</p>

    <div id="success-msg" class="auth-success hidden">
      Als dit e-mailadres bij ons bekend is, ontvang je binnen enkele minuten een e-mail met een reset-link.
    </div>

    <form class="auth-form" id="forgot-form">
      <input type="email" class="auth-input" id="fp-email" placeholder="E-mailadres" required autocomplete="email">
      <div class="auth-error" id="fp-error"></div>
      <button type="submit" class="btn-submit" id="fp-btn">Reset-link versturen</button>
    </form>

    <div class="auth-links">
      <a href="/">Terug naar inloggen</a>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      document.getElementById('forgot-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('fp-email').value;
        const errorEl = document.getElementById('fp-error');
        const btn = document.getElementById('fp-btn');

        errorEl.textContent = '';
        btn.disabled = true;
        btn.textContent = 'Bezig…';

        try {
          const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });

          if (res.ok) {
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('success-msg').classList.remove('hidden');
            return;
          }

          const data = await res.json().catch(() => ({}));
          errorEl.textContent = data.error || 'Er is iets misgegaan';
        } catch (err) {
          errorEl.textContent = 'Netwerkfout, probeer opnieuw';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Reset-link versturen';
        }
      });
    })();
  </script>
</body>
</html>
