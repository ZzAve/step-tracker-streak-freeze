<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nieuw wachtwoord – Stappen Streak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared.css">
  <style>
    .auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .auth-logo { font-size: 4rem; margin-bottom: 1rem; }
    .auth-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .auth-subtitle { color: var(--text-muted); margin-bottom: 2.5rem; font-size: 1rem; }
    .auth-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .auth-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-family: 'Nunito', system-ui, sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-input::placeholder { color: var(--text-muted); }
    .auth-error {
      color: var(--red);
      font-size: 0.875rem;
      min-height: 1.25rem;
      text-align: left;
    }
    .btn-submit {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.85rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Nunito', system-ui, sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-submit:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .auth-links { font-size: 0.875rem; color: var(--text-muted); }
    .auth-links a { color: var(--accent); text-decoration: none; }
    .invalid-screen { text-align: center; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="auth-screen" id="reset-screen">
    <div class="auth-logo">🔑</div>
    <h1 class="auth-title">Nieuw wachtwoord</h1>
    <p class="auth-subtitle">Kies een nieuw wachtwoord voor je account.</p>
    <form class="auth-form" id="reset-form">
      <input type="password" class="auth-input" id="rp-password" placeholder="Nieuw wachtwoord (min. 16 tekens, A-Z, a-z, 0-9, !@#)" required autocomplete="new-password" minlength="16">
      <input type="password" class="auth-input" id="rp-confirm" placeholder="Wachtwoord bevestigen" required autocomplete="new-password" minlength="16">
      <div class="auth-error" id="rp-error"></div>
      <button type="submit" class="btn-submit" id="rp-btn">Wachtwoord opslaan</button>
    </form>
    <div class="auth-links">
      <a href="/">Terug naar inloggen</a>
    </div>
  </div>

  <div class="auth-screen hidden" id="invalid-screen">
    <div class="auth-logo">⚠️</div>
    <h1 class="auth-title">Ongeldige link</h1>
    <p class="auth-subtitle">Deze reset-link is ongeldig of verlopen. Vraag een nieuwe aan.</p>
    <a href="/forgot-password.html" class="btn-submit" style="text-decoration:none; display:inline-block; margin-top: 1rem;">
      Nieuwe reset-link aanvragen
    </a>
  </div>

  <div class="auth-screen hidden" id="success-screen">
    <div class="auth-logo">✅</div>
    <h1 class="auth-title">Wachtwoord ingesteld</h1>
    <p class="auth-subtitle">Je wachtwoord is succesvol gewijzigd. Je kunt nu inloggen.</p>
    <a href="/" class="btn-submit" style="text-decoration:none; display:inline-block; margin-top: 1rem;">
      Inloggen
    </a>
  </div>

  <script src="/password-validation.js"></script>
  <script>
    (function () {
      'use strict';

      const token = new URLSearchParams(window.location.search).get('token');

      function show(id) { document.getElementById(id).classList.remove('hidden'); }
      function hide(id) { document.getElementById(id).classList.add('hidden'); }

      if (!token) {
        hide('reset-screen');
        show('invalid-screen');
      } else {
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const password = document.getElementById('rp-password').value;
          const confirm = document.getElementById('rp-confirm').value;
          const errorEl = document.getElementById('rp-error');
          const btn = document.getElementById('rp-btn');

          errorEl.textContent = '';

          const pwError = validatePassword(password);
          if (pwError) {
            errorEl.textContent = pwError;
            return;
          }

          if (password !== confirm) {
            errorEl.textContent = 'Wachtwoorden komen niet overeen';
            return;
          }

          btn.disabled = true;
          btn.textContent = 'Bezig…';

          try {
            const res = await fetch('/api/auth/reset-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token, password }),
            });

            if (res.ok) {
              hide('reset-screen');
              show('success-screen');
              return;
            }

            const data = await res.json().catch(() => ({}));
            if (data.error === 'Invalid or expired token') {
              hide('reset-screen');
              show('invalid-screen');
            } else {
              errorEl.textContent = data.error || 'Er is iets misgegaan';
              btn.disabled = false;
              btn.textContent = 'Wachtwoord opslaan';
            }
          } catch (err) {
            errorEl.textContent = 'Netwerkfout, probeer opnieuw';
            btn.disabled = false;
            btn.textContent = 'Wachtwoord opslaan';
          }
        });
      }
    })();
  </script>
</body>
</html>
